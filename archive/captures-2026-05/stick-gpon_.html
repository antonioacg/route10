function applyclick2()

  </select>
   </td>
  </tr>

      <td width="70%"><input type="text" name="fmgpon_ploam_password" size="20" maxlength="20" value="" </td>

      <td width="70%"><input type="text" name="fmgpon_sn" size="10" maxlength="12" value="HWTC370F0BAE"> </td>
  </tr>
</table>
<br>
      <input type="submit" value="Apply Changes" name="apply" onClick="return applyclick()">&nbsp;&nbsp;
      <input type="hidden" value="/gpon.asp" name="submit-url">
</form>
