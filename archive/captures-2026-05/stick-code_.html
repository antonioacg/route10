// Framebuster script to relocate browser when MSIE bookmarks this
// page instead of the parent frameset.  Set variable relocateURL to
// the index document of your website (relative URLs are ok):
var relocateURL = "/";

if(parent.frames.length == 0) {
  if(document.images) {
    location.replace(relocateURL);
  } else {
    location = relocateURL;
  }
}
</script>
<script >
scores = new Array(0);
btns = new Array(0);

function initIt()
{
	divColl = document.all.tags("div");
	for (i=0; i<divColl.length; i++)
 	{
		whichEl = divColl[i];
		if (whichEl.className == "Child")
			whichEl.style.display = "none";
	}
}

function closeMenu(el)
{
	for(i=0;i<0;i++)
	{
		for(j=0;j<0;j++){
			if(scores[i]!=el)
			{
				id=scores[i]+"Child"+j.toString();
				if(document.getElementById(id))
				{
					document.getElementById(id).style.display = "none";
					whichEl = eval(scores[i] + "Child");
					whichEl.style.display = "none";
					document.getElementById(btns[i]).src ="menu-images/menu_folder_closed.gif";
				}
			}
		}
	}
}

function expandMenu(el,imgs, num)
{
	closeMenu(el);
	if (num == 0) {
		whichEl1 = eval(el + "Child");
		for(i=0;i<0;i++)
		{
			whichEl = eval(scores[i] + "Child");
			if(whichEl!=whichEl1)
 			{
				whichEl.style.display = "none";
				document.getElementById(btns[i]).src ="menu-images/menu_folder_closed.gif";
			}
		}
		whichEl1 = eval(el + "Child");
		if (whichEl1.style.display == "none")
 		{
			whichEl1.style.display = "";
			document.getElementById(imgs).src ="menu-images/menu_folder_open.gif";
		}
		else {
			whichEl1.style.display ="none";
			document.getElementById(imgs).src ="menu-images/menu_folder_closed.gif";
		}
	}
	else {
		for(i=0;i<num;i++) {
			id = el + "Child"+i.toString();
			whichEl1 = document.getElementById(id);
			if (whichEl1) {
				if (whichEl1.style.display == "none")
				{
					whichEl1.style.display = "";
					document.getElementById(imgs).src ="menu-images/menu_folder_open.gif";
				}
				else {
					whichEl1.style.display ="none";
					document.getElementById(imgs).src ="menu-images/menu_folder_closed.gif";
				}
			}
		}
	}
}
</script>
